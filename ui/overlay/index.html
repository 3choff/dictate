<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transcript Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 12px;
        }

        #transcript-container {
            max-width: 100%;
            min-height: 32px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #transcript-container.visible {
            opacity: 1;
        }

        #transcript-text {
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            line-height: 1.4;
            padding: 8px 16px;
            border-radius: 12px;
            text-align: left;
            word-wrap: break-word;
            max-width: 100%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="transcript-container">
        <div id="transcript-text"></div>
    </div>

    <script>
        const container = document.getElementById('transcript-container');
        const textEl = document.getElementById('transcript-text');

        // Expose global functions for Rust to call via window.eval()
        window.__updateOverlayText__ = function(text) {
            if (text && text.trim()) {
                textEl.textContent = text;
                container.classList.add('visible');
            } else {
                window.__clearOverlayText__();
            }
        };

        window.__clearOverlayText__ = function() {
            container.classList.remove('visible');
            // Clear text after fade-out transition
            setTimeout(() => {
                textEl.textContent = '';
            }, 200);
        };

        // Also listen for Tauri events as a secondary mechanism
        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.listen('update-overlay-text', (event) => {
                window.__updateOverlayText__(event.payload);
            });

            window.__TAURI__.event.listen('clear-overlay-text', () => {
                window.__clearOverlayText__();
            });
        }
    </script>
</body>
</html>
